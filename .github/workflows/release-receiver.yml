name: Build and Release AirMic-Sink Receiver App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: windows-latest
    strategy:
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore src/AirMic.Receiver/AirMic.Receiver.csproj

      - name: Publish Receiver App
        run: dotnet publish src/AirMic.Receiver/AirMic.Receiver.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o publish/${{ matrix.rid }}

      - name: Archive Build Artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath publish/AirMic.Receiver-${{ matrix.rid }}.zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: publish/AirMic.Receiver-${{ matrix.rid }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
