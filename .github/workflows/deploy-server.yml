name: Build and Deploy AirMic Server to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC login
  contents: read
  packages: write # Required to push to GHCR

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Lowercase the repository owner name to prevent Docker naming errors (Docker requires lowercase tags)
      - name: Lowercase Repository Owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      # Build and Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/AirMic.Server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/airmic-server:latest
            ghcr.io/${{ env.OWNER_LC }}/airmic-server:${{ github.sha }}

      # Log in to Azure using OIDC
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy the image to Azure Container Apps
      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ghcr.io/${{ env.OWNER_LC }}/airmic-server:${{ github.sha }}
          # Supply GHCR pull credentials if the image is private (optional if public)
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.GHCR_USERNAME || github.actor }}
          registryPassword: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
